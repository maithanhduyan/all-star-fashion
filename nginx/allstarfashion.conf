# ============================================
# All Star Fashion — Nginx Reverse Proxy Config
# ============================================
# File: /etc/nginx/sites-available/allstarfashion.vn
# Symlink: ln -s /etc/nginx/sites-available/allstarfashion.vn /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name allstarfashion.vn www.allstarfashion.vn;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name allstarfashion.vn www.allstarfashion.vn;

    # ---------- SSL (Certbot auto-managed) ----------
    ssl_certificate     /etc/letsencrypt/live/allstarfashion.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/allstarfashion.vn/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ---------- Security Headers ----------
    add_header X-Frame-Options        "SAMEORIGIN"                            always;
    add_header X-Content-Type-Options "nosniff"                               always;
    add_header X-XSS-Protection       "1; mode=block"                         always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"       always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---------- Gzip Compression ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ---------- Client Body ----------
    client_max_body_size 10M;

    # ---------- Static Files (long cache) ----------
    location /static/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # ---------- Favicon ----------
    location = /favicon.svg {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
        expires 30d;
    }

    # ---------- Fresh _fresh/ assets ----------
    location /_frsh/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ---------- Main App ----------
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ---------- Deny hidden files ----------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
