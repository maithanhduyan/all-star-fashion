# ============================================
# All Star Fashion — Railway Configuration
# ============================================

[build]
# Railway tự detect Dockerfile
dockerfilePath = "Dockerfile"

[deploy]
# start.ts = auto migrate + seed + serve (one-click ready)
startCommand = "deno run -A start.ts"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
