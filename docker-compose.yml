# ============================================
# All Star Fashion — Docker Compose
# Services: app (Deno Fresh) + db (PostgreSQL)
# ============================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file: .env
    environment:
      - DATABASE_HOST=db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - allstar-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-allstar_fashion}
      POSTGRES_USER: ${DATABASE_USER:-allstar}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - allstar-net

volumes:
  pgdata:
    driver: local

networks:
  allstar-net:
    driver: bridge
