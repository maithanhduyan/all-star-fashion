<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="gold-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A96E"/>
      <stop offset="50%" stop-color="#E0C992"/>
      <stop offset="100%" stop-color="#C9A96E"/>
    </linearGradient>
  </defs>

  <!-- Star icon -->
  <g transform="translate(12, 10)">
    <!-- Outer star -->
    <path d="M16 0l4.9 10h11.1l-9 6.5 3.4 10.5L16 20.5 5.6 27l3.4-10.5-9-6.5H11L16 0z" fill="none" stroke="#C9A96E" stroke-width="1.2"/>
    <!-- Inner star fill -->
    <path d="M16 4l3.5 7.2h8l-6.5 4.7 2.5 7.6L16 18.8l-7.5 4.7 2.5-7.6-6.5-4.7h8L16 4z" fill="#C9A96E" opacity="0.2"/>
    <!-- Center dot -->
    <circle cx="16" cy="14" r="2" fill="#C9A96E"/>
  </g>

  <!-- ALL STAR text -->
  <text x="52" y="28" font-family="Georgia, 'Playfair Display', 'Times New Roman', serif" font-weight="700" font-size="24" fill="#111111" letter-spacing="3">ALL STAR</text>

  <!-- FASHION text -->
  <text x="52" y="46" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="11" fill="#6B6B6B" letter-spacing="6">FASHION</text>

  <!-- Gold divider line -->
  <rect x="52" y="31" width="60" height="0.8" rx="0.4" fill="url(#gold-accent)"/>
</svg>
